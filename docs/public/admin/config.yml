backend:
  name: git-gateway
  branch: main

locale: zh

media_folder: "docs/public/images"
public_folder: "/images"

collections:
  - name: "stage-1"
    label: "阶段一 · 快速认知"
    folder: "docs/stage-1"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "stage-2"
