backend:
  name: git-gateway
  branch: main

locale: zh

media_folder: "docs/public/images"
public_folder: "/images"

collections:
  - name: "stage-1"
    label: "阶段一 · 快速认知"
    folder: "docs/stage-1"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "stage-2"
    label: "阶段二 · 上手实操"
    folder: "docs/stage-2"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "stage-3"
    label: "阶段三 · 场景深耕"
    folder: "docs/stage-3"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "stage-4"
    label: "阶段四 · 持续进化"
    folder: "docs/stage-4"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }
